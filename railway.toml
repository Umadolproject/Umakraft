# railway.toml
# Railway deployment configuration.
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder      = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand            = "node Distribution/Discord/index.js"
restartPolicyType       = "on_failure"
restartPolicyMaxRetries = 5

# ---------------------------------------------------------------------------
# Environment variables — these appear in the Railway dashboard automatically.
# Fill in the values there; never commit real secrets to this file.
# ---------------------------------------------------------------------------

[variables]

# ── Discord (required) ──────────────────────────────────────────────────────
DISCORD_TOKEN      = ""
DISCORD_CLIENT_ID  = ""
DISCORD_GUILD_ID   = ""

# ── OpenAI (required — embeddings + GPT-4o-mini) ────────────────────────────
OPENAI_API_KEY   = ""
OPENAI_API_KEY_2 = ""   # backup key, rotated in automatically on rate-limit

# ── Gemini (simple-tier model fallback) ─────────────────────────────────────
GEMINI_API_KEY   = ""
GEMINI_API_KEY_2 = ""   # backup key, rotated in automatically on rate-limit

# ── Qdrant vector database (required for AI knowledge search) ───────────────
QDRANT_URL        = ""
QDRANT_API_KEY    = ""
QDRANT_COLLECTION = "umakraft"

# ── Web search — /ai live command (optional) ────────────────────────────────
TAVILY_API_KEY       = ""
TAVILY_API_KEY_2     = ""   # backup key
BRAVE_SEARCH_API_KEY   = ""
BRAVE_SEARCH_API_KEY_2 = ""   # backup key

# ── uma.moe API (optional tuning) ───────────────────────────────────────────
UMA_MOE_API_BASE_URL = "https://uma.moe/api"
API_TIMEOUT_MS       = "30000"
API_MAX_RETRIES      = "3"
